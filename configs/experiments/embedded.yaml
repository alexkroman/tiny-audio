# @package _global_
# ASR transcription training with whisper-base + SmolLM2-360M
# Same recipe as transcription.yaml, smaller encoder/decoder for comparison
#
# Usage:
#   poetry run python scripts/train.py +experiments=embedded

defaults:
  - override /data: multiasr

model:
  projector_type: mlp
  projector_pool_stride: 4
  projector_hidden_dim: 512
  audio_model_id: openai/whisper-base
  text_model_id: HuggingFaceTB/SmolLM2-360M

training:
  hub_model_id: "mazesmazes/tiny-audio-embedded"
  group_by_length: false  # Disabled: multi-dataset configs have inconsistent duration columns
  learning_rate: 1e-3
  warmup_steps: 500
  lr_scheduler_type: polynomial
  lr_scheduler_kwargs:
    power: 0.5
  seed: 42
  auto_find_batch_size: true
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 64
  gradient_accumulation_steps: 4
  num_train_epochs: 1
  save_steps: 1000
  eval_steps: 1000

  label_smoothing_factor: 0.1
  weight_decay: 0.0

  use_specaugment: true
  # LibriDouble settings (2 masks each)
  num_time_masks: 2
  time_mask_length: 100
  num_freq_masks: 2
  freq_mask_length: 27
