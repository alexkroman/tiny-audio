# @package _global_
# Continued training of mazesmazes/tiny-audio-embedded
# (GLM-ASR-Nano-2512 + Qwen3-0.6B, full-decoder fine-tune).
# Loads projector + decoder weights from the Hub checkpoint and resumes training.
#
# Usage:
#   poetry run python scripts/train.py +experiments=embedded

defaults:
  - override /data: multiasr

model:
  projector_type: mlp
  projector_pool_stride: 4
  projector_hidden_dim: 2048
  audio_model_id: zai-org/GLM-ASR-Nano-2512
  # Qwen3-0.6B ships with a chat_template, which DataCollatorForChatML requires.
  text_model_id: Qwen/Qwen3-0.6B
  # Load projector + decoder weights from the published checkpoint and continue
  # training from there. ASRModel.from_pretrained overlays both via load_state_dict.
  pretrained_model_path: mazesmazes/tiny-audio-embedded

training:
  hub_model_id: "mazesmazes/tiny-audio-embedded"
  group_by_length: false  # Disabled: multi-dataset configs have inconsistent duration columns
  # Full decoder fine-tuning (projector + Qwen3-0.6B). Saved checkpoints contain the full LM.
  freeze_language_model: false
  # Stage-2 LRs are 10× lower than stage 1 (which used 1e-3 / 1e-4),
  # derived from stage 1's actual eval/loss vs LR trajectory rather than
  # a heuristic. Stage 1's final 0.011 nats of eval-loss convergence
  # (0.2154 → 0.2044) happened during steps 45K–65K, when projector LR
  # was between 1.5e-4 and ~0. 1e-4 corresponds to that late-refinement
  # regime — the speed at which the model was still actively improving
  # at the end of stage 1. Starting stage 2 here means peak LR matches
  # the LR that produced the last meaningful refinement, with enough
  # headroom to absorb the new aug distribution + Peoples mix shift
  # without injecting energy at the active-learning LR (3e-4+) that
  # would risk knocking the converged decoder out of its basin.
  learning_rate: 1e-4
  decoder_learning_rate: 1e-5
  # 500 steps complements the lower peak LR: warmup alone doesn't fix a
  # too-high peak, and a lower peak still benefits from a gradual ramp
  # so fresh Adam moments settle before steady-state.
  warmup_steps: 500
  lr_scheduler_type: cosine
  seed: 43
  auto_find_batch_size: false
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 2
  num_train_epochs: 1
  save_steps: 1000
  eval_steps: 1000

  # Keep the Blackwell fed; audio decode + mel extraction is the bottleneck
  # at this batch size. AMD EPYC 9355 has 32 cores / 64 threads — leave a
  # handful free for the main process, GPU sync, and tokenizer threads.
  dataloader_num_workers: 8
  dataloader_prefetch_factor: 2

  # SDPA (PyTorch-native, cuDNN flash backend on Blackwell) — avoids the slow
  # flash-attn source build on RunPod and is fast enough at our seq lengths.
  attn_implementation: sdpa


  torch_compile: false
