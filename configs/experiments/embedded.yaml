# @package _global_
# ASR transcription training with whisper-base + SmolLM2-360M
# Same recipe as transcription.yaml, smaller encoder/decoder for comparison
#
# Usage:
#   poetry run python scripts/train.py +experiments=embedded

defaults:
  - override /data: multiasr

model:
  projector_type: mlp
  projector_pool_stride: 4
  projector_hidden_dim: 512
  audio_model_id: openai/whisper-base
  text_model_id: HuggingFaceTB/SmolLM2-360M

training:
  hub_model_id: "mazesmazes/tiny-audio-embedded"
  group_by_length: false  # Disabled: multi-dataset configs have inconsistent duration columns
  # Tuned for RTX PRO 6000 Blackwell Server Edition (96 GB).
  # Effective batch = 256 (vs 56 in transcription.yaml); LR sqrt-scaled accordingly.
  learning_rate: 2e-3
  warmup_steps: 750
  lr_scheduler_type: polynomial
  lr_scheduler_kwargs:
    power: 0.5
  seed: 42
  auto_find_batch_size: false
  per_device_train_batch_size: 256
  per_device_eval_batch_size: 256
  gradient_accumulation_steps: 1
  num_train_epochs: 1
  save_steps: 1000
  eval_steps: 1000

  # Keep the Blackwell fed; audio decode + mel extraction is the bottleneck at this batch size.
  dataloader_num_workers: 16
  dataloader_prefetch_factor: 4

  # SDPA (PyTorch-native, cuDNN flash backend on Blackwell) — avoids the slow
  # flash-attn source build on RunPod and is fast enough at our seq lengths.
  attn_implementation: sdpa

  label_smoothing_factor: 0.1
  weight_decay: 0.0

  use_specaugment: true
  # LibriDouble settings (2 masks each)
  num_time_masks: 2
  time_mask_length: 100
  num_freq_masks: 2
  freq_mask_length: 27
