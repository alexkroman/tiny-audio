# @package _global_
# ASR transcription training with GLM-ASR-Nano-2512 + Qwen3-0.6B
# Same recipe as transcription.yaml, ASR-pretrained encoder for stronger init.
#
# Usage:
#   poetry run python scripts/train.py +experiments=embedded

defaults:
  - override /data: multiasr

model:
  projector_type: mlp
  projector_pool_stride: 4
  projector_hidden_dim: 2048
  audio_model_id: zai-org/GLM-ASR-Nano-2512
  # Qwen3-0.6B ships with a chat_template, which DataCollatorForChatML requires.
  text_model_id: Qwen/Qwen3-0.6B

training:
  hub_model_id: "mazesmazes/tiny-audio-embedded-2"
  group_by_length: false  # Disabled: multi-dataset configs have inconsistent duration columns
  # Full decoder fine-tuning (projector + Qwen3-0.6B). Saved checkpoints contain the full LM.
  freeze_language_model: false
  # Tuned for RTX PRO 6000 Blackwell Server Edition (96 GB).
  # Projector LR mirrors transcription.yaml; the LM gets a much lower LR
  # (typical full-decoder fine-tuning range) to avoid catastrophic forgetting.
  learning_rate: 1e-3
  decoder_learning_rate: 1e-4
  decoder_weight_decay: 0.001
  # Wider warmup gives the randomly-initialized projector time to settle before
  # the LM's much smaller LR starts to bite — important now that the LM is
  # trainable and the projector dominates early gradients.
  warmup_steps: 2000
  lr_scheduler_type: cosine
  seed: 42
  auto_find_batch_size: false
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 2
  num_train_epochs: 2
  save_steps: 1000
  eval_steps: 1000

  # Keep the Blackwell fed; audio decode + mel extraction is the bottleneck at
  # this batch size. AMD EPYC 9355 has 32 cores / 64 threads — leave a handful
  # free for the main process, GPU sync, and tokenizer threads.
  dataloader_num_workers: 8
  dataloader_prefetch_factor: 2

  # SDPA (PyTorch-native, cuDNN flash backend on Blackwell) — avoids the slow
  # flash-attn source build on RunPod and is fast enough at our seq lengths.
  attn_implementation: sdpa

  label_smoothing_factor: 0.1
  weight_decay: 0.0
