# @package _global_
# LM-Stage3: Chain-of-modality instruction fine-tuning (SpeechGPT-style)
#
# Uses apply_chat_template with trl's training template and optional reasoning.
# Produces FOUR training samples per data point:
#   1. Speech→Speech, 2. Speech→Text, 3. Text→Speech, 4. Text→Text
# Reasoning is embedded as <think>\n{reasoning}\n</think>\n\n in assistant content.
# If no reasoning column, the training template adds empty <think>\n\n</think>\n\n.
# Loss is only on the completion side (after assistant header).
#
# Uses spoken-alpaca-gpt4-xcodec2 (pre-computed xcodec2 codes).
#
# Usage:
#   poetry run python scripts/train.py +experiments=lm_stage3

defaults:
  - override /data: lm_stage3

model:
  max_seq_length: 2048

tts:
  enabled: true
  stage: 3
  stage1_checkpoint: "mazesmazes/tiny-audio-lm-stage2"

training:
  output_dir: ./outputs/lm-stage3
  hub_model_id: "mazesmazes/tiny-audio-lm-stage3"
  report_to: wandb
  wandb_project: tiny-audio-lm-stage3

  # Optimizer
  optim: adamw_torch_fused
  adam_beta2: 0.95
  learning_rate: 1e-4
  warmup_steps: 100
  lr_scheduler_type: polynomial
  lr_scheduler_kwargs:
    power: 0.5
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Batch size
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2
  auto_find_batch_size: true

  # Training duration
  num_train_epochs: 3
  seed: 42

  # Eval & save
  eval_strategy: steps
  eval_steps: 500
  save_strategy: steps
  save_steps: 500
  save_total_limit: 5
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false

  # Performance
  group_by_length: false
  bf16: true
  tf32: true
  gradient_checkpointing: false
  torch_compile: true
  use_liger: true
  dataloader_num_workers: 8
  dataloader_pin_memory: true
  dataloader_drop_last: true

  remove_unused_columns: false
  logging_steps: 25
  logging_first_step: true
  disable_tqdm: false
  push_to_hub: true
