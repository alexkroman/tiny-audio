# @package _global_
# LM-Stage2-TTS: Text-to-speech only fine-tuning
#
# Like lm_stage2 but only the speak direction (text → speech).
# One sample per data point instead of two.
#
# Uses emilia-en-xcodec2 (pre-computed xcodec2 codes).
#
# Usage:
#   poetry run python scripts/train.py +experiments=lm_stage2_tts

defaults:
  - override /data: tts_xcodec2

model:
  max_seq_length: 2048

tts:
  enabled: true
  stage: 2
  tts_only: true
  stage1_checkpoint: "mazesmazes/tiny-audio-lm-stage1"

training:
  output_dir: ./outputs/lm-stage2-tts
  hub_model_id: "mazesmazes/tiny-audio-lm-stage2-tts"
  report_to: wandb
  wandb_project: tiny-audio-lm-stage2-tts

  # Optimizer
  optim: adamw_torch_fused
  adam_beta2: 0.95
  learning_rate: 1e-4
  warmup_steps: 100
  lr_scheduler_type: cosine
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Batch size — 1 sample per data point (vs 2 in lm_stage2), so can increase
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 1
  auto_find_batch_size: false

  # Training duration
  num_train_epochs: 1
  seed: 43

  # Eval & save
  eval_strategy: steps
  eval_steps: 1000
  save_strategy: steps
  save_steps: 1000
  save_total_limit: 5
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false

  # Performance
  group_by_length: false
  bf16: true
  tf32: true
  gradient_checkpointing: false
  torch_compile: true
  use_liger: true
  dataloader_num_workers: 8
  dataloader_pin_memory: true
  dataloader_drop_last: true

  remove_unused_columns: false
  logging_steps: 25
  logging_first_step: true
  disable_tqdm: false
  push_to_hub: true
