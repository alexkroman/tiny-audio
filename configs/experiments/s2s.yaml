# @package _global_
# Standalone AudioHead training: text tokens -> NeuCodec FSQ codes
#
# Architecture:
#   Text tokens -> Embedding -> LlamaModel (4 layers, 256 dim, 4 heads)
#   -> head -> NeuCodec FSQ codes -> audio (24kHz)
#
# ~30M trainable params. No encoder, no LLM.
#
# Usage:
#   poetry run python scripts/train.py +experiments=s2s
#
# To assemble the full S2S model after training:
#   ta assemble-s2s --audio-head mazesmazes/tiny-audio-head --output mazesmazes/tiny-audio-s2s

defaults:
  - override /data: s2s_neucodec

model:
  # Tokenizer must match the base ASR model's LLM (SmolLM3-3B)
  text_model_id: HuggingFaceTB/SmolLM3-3B
  max_text_length: 256

  # AudioHead architecture
  decoder_dim: 256
  decoder_layers: 4
  decoder_heads: 4
  max_audio_tokens: 500

# S2S mode flag (triggers standalone AudioHead training)
s2s:
  enabled: true

training:
  output_dir: ./outputs/audio_head
  hub_model_id: "mazesmazes/tiny-audio-head"
  report_to: wandb
  wandb_project: tiny-audio-s2s

  # Optimizer
  optim: adamw_torch_fused
  learning_rate: 1e-3
  warmup_steps: 100
  lr_scheduler_type: cosine
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Batch size (can be large since no encoder/LLM in memory)
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 2

  # Training duration
  num_train_epochs: 1
  seed: 42

  # Eval & save
  eval_strategy: steps
  eval_steps: 10000
  save_strategy: steps
  save_steps: 10000
  save_total_limit: 5
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false

  # Performance
  group_by_length: false
  bf16: true
  tf32: true
  dataloader_num_workers: 8
  dataloader_pin_memory: true
  dataloader_drop_last: true

  # Tell Trainer that codec_labels is the label key
  label_names:
    - codec_labels

  remove_unused_columns: false
  logging_steps: 50
  logging_first_step: true
  disable_tqdm: false
  push_to_hub: false
