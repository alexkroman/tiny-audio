# @package _global_
# Speech-to-Speech (S2S) training: MLP projector + frozen Dia TTS decoder
#
# Architecture:
#   LLM hidden states -> MLP (2048->1024) -> codebook heads -> DAC codes loss
#   At inference: MLP output -> frozen Dia decoder -> DAC codes -> audio (44.1kHz)
#
# Only the MLP projector + codebook heads are trained (~17M params).
#
# Usage:
#   poetry run python scripts/train.py +experiments=s2s
#
# Prerequisites:
#   - Pretrained ASR model at mazesmazes/tiny-audio-omni (or specify model.pretrained_model_path)
#   - Dataset with pre-computed DAC codes (use scripts/generate_dac.py)

defaults:
  - override /data: s2s_codes

model:
  # Start from pretrained ASR model
  pretrained_model_path: mazesmazes/tiny-audio-omni
  model_dtype: bfloat16

  projector_type: mlp
  projector_pool_stride: 4
  projector_hidden_dim: 1024
  audio_model_id: zai-org/GLM-ASR-Nano-2512
  text_model_id: HuggingFaceTB/SmolLM3-3B

  # Generation defaults
  do_sample: false
  max_new_tokens: 512
  enable_thinking: false
  repetition_penalty: 1.1

  # Freeze projector (ASR already trained), train audio head
  freeze_projector: true

  # Audio head settings (Dia TTS decoder)
  use_audio_head: true
  freeze_audio_head: false
  max_audio_tokens: 500
  dia_model_id: "nari-labs/Dia-1.6B-0626"

# S2S configuration flag
s2s:
  enabled: true

training:
  hub_model_id: "mazesmazes/tiny-audio-s2s"
  group_by_length: false
  # Track best model by eval loss
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  learning_rate: 1e-3
  warmup_steps: 100
  lr_scheduler_type: constant_with_warmup
  seed: 42
  per_device_train_batch_size: 12
  per_device_eval_batch_size: 12
  gradient_accumulation_steps: 2
  num_train_epochs: 30
  save_steps: 1000
  eval_steps: 1000

  weight_decay: 0.01
  max_grad_norm: 1.0

  use_specaugment: false

  # S2S uses codec_targets for DAC token prediction
  label_names: ["codec_targets"]
  label_smoothing: 0.0
