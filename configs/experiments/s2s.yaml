# @package _global_
# Standalone AudioHead training: text -> frozen LLM -> projector -> neutts-nano -> speech codes
#
# Architecture:
#   Text -> SmolLM3-3B (frozen) -> hidden states (3072-dim)
#   -> Projector MLP (trainable, 3072 -> 1024 -> 576)
#   -> Concat with codec embeddings -> neutts-nano backbone (frozen)
#   -> lm_head -> speech token logits -> NeuCodec codes -> audio (24kHz)
#
# Only the projector MLP is trainable. Both SmolLM3 and neutts-nano are frozen.
#
# Usage:
#   poetry run python scripts/train.py +experiments=s2s
#
# To assemble the full S2S model after training:
#   ta assemble-s2s --audio-head mazesmazes/tiny-audio-head --output mazesmazes/tiny-audio-s2s

defaults:
  - override /data: s2s_neucodec

model:
  # Frozen TTS backbone (pretrained LlamaForCausalLM for NeuCodec generation)
  tts_model_id: neuphonic/neutts-nano

  # Frozen LLM (shared with ASR path — text -> hidden states)
  llm_model_id: HuggingFaceTB/SmolLM3-3B

  # Projector MLP: llm_dim (3072) -> projector_hidden -> backbone_dim (576)
  projector_hidden: 1024

  # Text tokenization (uses LLM's tokenizer)
  max_text_length: 256

  # Audio generation limits
  max_audio_tokens: 500

# S2S mode flag (triggers standalone AudioHead training)
s2s:
  enabled: true

training:
  output_dir: ./outputs/audio_head
  hub_model_id: "mazesmazes/tiny-audio-head"
  report_to: wandb
  wandb_project: tiny-audio-s2s

  # Optimizer
  optim: adamw_torch_fused
  learning_rate: 1e-3
  warmup_steps: 100
  lr_scheduler_type: cosine
  weight_decay: 0.0
  max_grad_norm: 1.0

  # Batch size (LLM + backbone are frozen so less VRAM for gradients,
  # but SmolLM3 (~3B) + neutts-nano (~117M) both reside in memory)
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 8

  # Training duration
  num_train_epochs: 1
  seed: 42

  # Eval & save
  eval_strategy: steps
  eval_steps: 1000
  save_strategy: steps
  save_steps: 1000
  save_total_limit: 5
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false

  # Performance
  group_by_length: false
  bf16: true
  tf32: true
  gradient_checkpointing: false
  dataloader_num_workers: 8
  dataloader_pin_memory: true
  dataloader_drop_last: true

  # Tell Trainer that codec_labels is the label key
  label_names:
    - codec_labels

  remove_unused_columns: false
  logging_steps: 25
  logging_first_step: true
  disable_tqdm: false
  push_to_hub: false
