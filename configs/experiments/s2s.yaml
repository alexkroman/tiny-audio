# @package _global_
# Speech-to-Speech (S2S) training: trainable AR decoder + Mimi codec
#
# Architecture:
#   LLM hidden states -> Linear (2048->1024) -> LlamaModel (4 layers, 1024 dim, 8 heads)
#   -> 8 codebook heads -> Mimi codes -> audio (24kHz)
#
# All decoder parameters are trained (~50M params). Direct gradient path.
#
# Usage:
#   poetry run python scripts/train.py +experiments=s2s
#
# Prerequisites:
#   - Pretrained ASR model at mazesmazes/tiny-audio-omni (or specify model.pretrained_model_path)
#   - Dataset with pre-computed Mimi codes (use scripts/generate_mimi.py)

defaults:
  - override /data: s2s_mimi

model:
  # Start from pretrained ASR model
  pretrained_model_path: mazesmazes/tiny-audio-omni
  model_dtype: bfloat16

  projector_type: mlp
  projector_pool_stride: 4
  projector_hidden_dim: 1024
  audio_model_id: zai-org/GLM-ASR-Nano-2512
  text_model_id: HuggingFaceTB/SmolLM3-3B

  # Generation defaults
  do_sample: false
  max_new_tokens: 512
  enable_thinking: false
  repetition_penalty: 1.1

  # Freeze projector (ASR already trained), train audio head
  freeze_projector: true

  # Audio head settings (trainable AR decoder + Mimi)
  use_audio_head: true
  freeze_audio_head: false
  max_audio_tokens: 500
  num_codebooks: 8
  decoder_dim: 512
  decoder_layers: 6
  decoder_heads: 8
  mimi_model_id: "kyutai/mimi"

# S2S configuration flag
s2s:
  enabled: true

training:
  hub_model_id: "mazesmazes/tiny-audio-s2s"
  group_by_length: false
  # Track best model by eval loss
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  learning_rate: 1e-3
  warmup_steps: 100
  lr_scheduler_type: cosine
  seed: 42
  per_device_train_batch_size: 24
  per_device_eval_batch_size: 24
  gradient_accumulation_steps: 4
  num_train_epochs: 30
  save_steps: 500
  eval_steps: 500

  weight_decay: 0.01
  max_grad_norm: 1.0

  use_specaugment: false

  # Tell Trainer that codec_labels is the label key so eval_loss is computed
  label_names:
    - codec_labels
  label_smoothing: 0.0
