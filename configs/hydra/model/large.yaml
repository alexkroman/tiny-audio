# Large model configuration
decoder_model_name: HuggingFaceTB/SmolLM3-3B-Base

# LoRA configuration
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

# Compilation settings
compile_decoder: true  # Compile only the decoder, not the projector
compile_mode: reduce-overhead  # Options: default, reduce-overhead, max-autotune