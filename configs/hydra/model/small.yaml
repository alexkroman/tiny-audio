# Small model configuration
decoder_model_name: HuggingFaceTB/SmolLM2-135M

# LoRA configuration
use_lora: true
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

# Compilation settings (disable for small model by default)
compile_decoder: false  # Small model doesn't benefit as much from compilation
compile_mode: default