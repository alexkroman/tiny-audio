# ASR Noise Robust dataset configuration
datasets:
  - path: m-aliabbas1/asr-noise-robust-en
    name: null  # No config name needed
    audio_column: audio
    text_column: text
    train_splits:
      - train
    eval_splits:
      - train  # No separate eval split, use train split with sampling

# Data filtering
max_audio_seconds: 20.0  # Dataset has audio trimmed 2-6 seconds, so 20s is safe

# Audio processing
sample_rate: 16000

# Processing options
dataset_cache_dir: ${hydra:runtime.cwd}/datasets_cache
num_proc: 8
max_train_samples: null  # Use full 84k samples
max_eval_samples: 1000  # Sample 1000 from train for eval
use_streaming: true  # Enable streaming for large dataset (11.9 GB)
