# LoquaciousSet dataset configuration
datasets:
  - name: loquaciousset
    train_splits:
      - train
    eval_splits:
      - validation

# Data filtering
max_audio_seconds: 30.0  # LoquaciousSet can have longer utterances

# Audio processing
sample_rate: 16000

# Processing options
dataset_cache_dir: ${hydra:runtime.cwd}/datasets_cache
num_proc: 8
max_train_samples: null
max_eval_samples: 500
use_streaming: true  # Enable streaming mode for faster startup