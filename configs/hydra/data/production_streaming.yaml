# Production dataset with streaming for faster startup
datasets:
  - name: librispeech_asr
    configs:
      - clean
      - clean
      - other
    audio_column: audio  # LibriSpeech uses 'audio' column
    text_column: text    # LibriSpeech uses 'text' column
    train_splits:
      - train.100
      - train.360
      - train.500
    eval_splits:
      - validation
      - validation
      - validation

  - name: gigaspeech
    subset: m  # ~1000 hours (medium subset)
    audio_column: audio  # GigaSpeech uses 'audio' column
    text_column: text    # GigaSpeech uses 'text' column
    cleaner: gigaspeech  # Apply GigaSpeech-specific text cleaning
    train_splits:
      - train
    eval_splits:
      - validation

  - name: common_voice
    language: en
    audio_column: audio    # Common Voice uses 'audio' column
    text_column: sentence  # Common Voice uses 'sentence' column
    train_splits:
      - train  # Full train split for streaming
    eval_splits:
      - validation

  - path: speechbrain/LoquaciousSet
    name: clean  # Config name for LoquaciousSet
    audio_column: wav    # LoquaciousSet uses 'wav' instead of 'audio'
    text_column: text    # LoquaciousSet uses 'text' column
    train_splits:
      - train
    eval_splits:
      - dev

# Data filtering
max_audio_seconds: 20.0

# Audio processing
sample_rate: 16000

# Processing options
dataset_cache_dir: ${hydra:runtime.cwd}/datasets_cache
num_proc: 8  # Not used in streaming mode
max_train_samples: null
max_eval_samples: 500
use_streaming: true  # Enable streaming mode for faster startup