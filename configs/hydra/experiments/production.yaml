# @package _global_

defaults:
  - override /model: large
  - override /data: loquaciousset  # Use LoquaciousSet dataset
  - override /training: production

# Resume from checkpoint (root level override)
#resume_from_checkpoint: /workspace/outputs/2025-09-23/21-58-09/outputs/production_model/checkpoint-27000
resume_from_checkpoint: null

# Production-specific overrides
training:
  push_to_hub: true

  # Streaming compatibility settings
  dataloader_num_workers: 4
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 4
