# Production training configuration
output_dir: ./outputs/production_model

# Optimizer
optim: adamw_torch_fused
learning_rate: 1e-3
max_grad_norm: 1.0
warmup_steps: 2000
lr_scheduler_type: cosine

# Training
max_steps: -1
num_train_epochs: 1
seed: 42
per_device_train_batch_size: 6
per_device_eval_batch_size: 6
gradient_accumulation_steps: 3
eval_accumulation_steps: 3

# Logging
logging_steps: 25
logging_first_step: true
logging_nan_inf_filter: false
report_to: wandb
wandb_project: tiny-audio

# Evaluation
eval_strategy: steps
eval_steps: 1000

# Saving
save_strategy: steps
save_steps: 500
save_total_limit: 5
load_best_model_at_end: false
metric_for_best_model: eval_loss
greater_is_better: false
save_safetensors: true

# Hub
push_to_hub: true
hub_model_id: "mazesmazes/tiny-audio"
hub_strategy: every_save
hub_token: null
hub_private_repo: false

# Performance
fp16: false
bf16: true
tf32: true
torch_compile: true
# group_by_length varies the batch shape per bucket, which would otherwise
# blow past dynamo's default cache_size_limit=8 and force eager fallback.
torch_compile_config:
  cache_size_limit: 256
attn_implementation: flash_attention_2

# Data loading
dataloader_num_workers: 24
dataloader_prefetch_factor: 2
dataloader_pin_memory: true
dataloader_persistent_workers: true
dataloader_drop_last: true
group_by_length: true
length_column_name: duration

# RIR (Room Impulse Response) augmentation — convolves with a random RIR
# from a pool of real recorded RIRs to simulate far-field / reverberant
# audio. SOTA recipe used by NeMo / Canary / Parakeet. Run
# `ta dev download-rirs` to fetch OpenSLR-28 to ~/.cache/openslr-28.
rir_augmentation:
  enabled: true
  # OpenSLR-28's real recorded RIRs. pointsource_noises is intentionally
  # excluded — those are noise clips, not impulse responses. simulated_rirs
  # is also excluded — only real RIRs are used.
  corpus_path:
    - ~/.cache/openslr-28/real_rirs_isotropic_noises
  prob: 0.5

# Noise augmentation — MUSAN ambient + MUSAN babble + always-on Gaussian
# sensor floor + EQ + clipping + OneOf{LPF, telephony BPF} + gain.
# Music subset is excluded; ambient and speech (babble) subsets are
# wired in as separate AddBackgroundNoise stages with independent SNR
# ranges and probabilities.
noise_augmentation:
  enabled: true
  # MUSAN ambient subset (`musan/noise` — ~930 wav, ~6 hours: rain,
  # thunder, wind, crowd chatter, cafeteria, footsteps, paper, mechanical,
  # phone tones). Stationary background; pairs with babble below for
  # multi-talker scenes.
  corpus_path:
    - ~/.cache/musan/musan/noise
  # Dropped from 0.6 → 0.45 when babble was added, so the union of
  # "any background mixture fired" stays in the ~55% range and the
  # ~10% fully-clean tail (clean = no MUSAN AND bandlimit didn't fire)
  # is preserved. Further dropped 0.45 → 0.35 after eval showed
  # clean-source corpora (LS Clean +0.63, LS Other +1.10, Tedlium +2.08)
  # all trailing universal-3-pro despite no data shortage on read
  # speech. Switchboard (-5.02) and AMI-SDM (-3.91) wins prove noise
  # robustness is well-covered, so the aug footprint can shrink without
  # losing those wins.
  prob: 0.35
  # SNR floor raised from 5 → 8 dB after eval data confirmed the OOD
  # concern below: clean-source corpora trailing universal-3-pro despite
  # the model having no data shortage on read speech. The 5 dB floor was
  # pushing frozen Whisper features OOD on a meaningful fraction of clips.
  # 8 dB stays within realistic SNR distributions for almost all evals
  # while protecting the encoder feature distribution. Below 8, frozen
  # Whisper produces encoder features outside its training distribution
  # so the projector trains on features that don't correspond to anything
  # realistic at inference. Upper bound of 30 dB lets some samples be
  # effectively clean.
  min_snr_db: 8.0
  max_snr_db: 30.0
  # MUSAN babble (`musan/speech` — multi-talker speech). Targets the
  # acoustic signature of meeting / conference / uncontrolled-mic evals
  # (Earnings22, AMI IHM) that stationary ambient noise underspecifies.
  # SNR floor (15 dB) is intentionally higher than ambient (5 dB) — empirically
  # at 10 dB the synthetic masker stacks on natively-overlapping training
  # corpora (Peoples / AMI source already has multi-speaker content) and the
  # label becomes ambiguous; 15 dB keeps babble recognisable as background.
  # Probability dropped 0.20 → 0.15 → 0.10 across successive runs after
  # repeatedly observing collateral regression on clean-source corpora.
  # Switchboard (-5.02) wins partly come from babble, but the win has
  # enough margin to absorb a small babble reduction; meanwhile clean
  # corpora (LS Clean / LS Other / Tedlium / VoxPopuli) all trail
  # universal-3-pro at the current setting. Drop trades a small slice
  # of conversational-overlap robustness for clean-source feature
  # stability. Watch Switchboard on next eval — if the lead shrinks
  # below 3pt, revert.
  babble_corpus_path:
    - ~/.cache/musan/musan/speech
  babble_prob: 0.10
  babble_min_snr_db: 15.0
  babble_max_snr_db: 25.0
  # Always-on additive colored-noise sensor floor — present whether or
  # not MUSAN fired this clip, since real recordings always have per-clip
  # background dither. SNR sampled uniformly per clip; 20-40 dB is the
  # canonical "background dither" range. Spectral shape sits around pink
  # (-3 dB/octave) with a narrow spread: pink/brown matches real
  # mic-preamp 1/f noise and acoustic-room HVAC far better than white
  # Gaussian, and Whisper has seen far more pink-ish dither in
  # pretraining than flat-spectrum noise. Set both SNR bounds to null
  # to disable.
  color_noise_min_snr_db: 20.0
  color_noise_max_snr_db: 40.0
  # f_decay in dB/octave: 0 = white, -3 = pink, -6 = brown.
  color_noise_min_f_decay: -4.0
  color_noise_max_f_decay: -2.0
  # Sparse short-duration transient events (phone dings, key clicks, dog
  # barks, doors) layered on top of the stationary background mix. MUST be
  # a sound-event corpus (FSD50K), NOT MUSAN — MUSAN/noise is stationary
  # so AddShortNoises on it just duplicates AddBackgroundNoise's
  # distribution. Run `ta dev download-fsd50k` to fetch FSD50K eval split.
  # Set short_noises_corpus_path: null to disable.
  short_noises_corpus_path:
    - ~/.cache/fsd50k/FSD50K.eval_audio
  short_noises_prob: 0.5
  # Seven-band parametric EQ — simulates mic / preamp coloration. ±4 dB
  # (vs library default ±12) is tuned for projector training: Whisper has
  # already seen wide EQ variation in pretraining and aggressive EQ pushes
  # features OOD. For training the encoder from scratch, push to ±6-8 dB.
  eq_prob: 0.5
  eq_min_db: -4.0
  eq_max_db: 4.0
  # Hard clipping at a low percentile (top 10% of samples). Library
  # default of 40 is more aggressive than Whisper's training distribution.
  # max_percentile=10 is tuned for projector training; push to 20 if
  # training the encoder from scratch. Probability lowered 0.10 → 0.05
  # as part of a broader noise-aug footprint reduction targeted at the
  # clean-source eval gaps; Switchboard / AMI don't depend on clipping
  # aug specifically, so this shouldn't regress those wins.
  clipping_prob: 0.05
  clipping_max_percentile: 10
  # Band-limit branch — when fired, picks exactly one of low-pass
  # (cheap-mic / consumer-device cutoff, 3-7.5 kHz) or telephony band-pass
  # (G.711 / PSTN passband ≈ 200-4000 Hz). Wrapping in OneOf prevents
  # incoherent stacks of band-limits on the same clip. 0.3 matches the
  # prior 0.15 LPF + 0.15 BPF total exposure.
  bandlimit_prob: 0.3
  lowpass_min_cutoff: 3000.0
  lowpass_max_cutoff: 7500.0
  bandpass_min_center_freq: 2000.0
  bandpass_max_center_freq: 2200.0
  bandpass_min_bandwidth_fraction: 1.7
  bandpass_max_bandwidth_fraction: 1.9
  # Gain perturbation — applied late, so it shifts target+noise together
  # and simulates ADC / input-level variability. Whisper normalizes mels
  # per-clip but not perfectly across very different input levels, so
  # this actually moves encoder features (unlike speed perturbation,
  # which a frozen encoder largely absorbs). ±6 dB is the canonical
  # range; targets Earnings22's variable-level conference audio.
  gain_prob: 0.5
  gain_min_db: -6.0
  gain_max_db: 6.0
  # MP3 round-trip — conservatively re-enabled at p=0.10 with
  # min_bitrate=96. The prior failed experiment used p=0.20 with 32 kbps
  # min-bitrate which stacked with bandlimit to produce systematic
  # regressions on clean-source corpora (CV / LS / Tedlium / VoxPopuli /
  # Switchboard all moved +0.4-1.9 WER) and a catastrophic AMI-SDM
  # regression (+9.7 WER) where the codec compounded with already-
  # bandlimited far-field audio. At 96-128 kbps the codec stays within
  # the realistic distribution of modern podcast / streaming encoding
  # (Gigaspeech podcast slice, in-the-wild YouTube content) and the
  # halved probability reduces the joint MP3+bandlimit firing rate to
  # ~3% (vs the prior failed 6%). Watch AMI-SDM on the next eval — if
  # the -3.91 lead shrinks meaningfully, MP3 is still re-stacking
  # despite the lower prob and should drop back to 0.
  mp3_prob: 0.10
  mp3_min_bitrate: 96
  mp3_max_bitrate: 128

# Probability of replacing a training sample's audio with a noise-only
# clip + empty target. Teaches the model "no speech → emit nothing" — a
# documented failure mode for Whisper-based and SALMONN-based speech LLMs
# (backchanneling "yeah" / "huh" / "i" on AMI silence segments).
# Speech-LLM-recipe modal range is 0.03-0.10. Requires
# noise_augmentation.enabled (the corpus is the noise-only source).
silence_injection_prob: 0.05

# Misc
disable_tqdm: false
log_level: info
ignore_data_skip: false
resume_from_checkpoint: null

# Required by HF Trainer
remove_unused_columns: false
label_names:
  - labels
