# Production training configuration
output_dir: ./outputs/production_model

# Optimizer
optim: adamw_torch_fused
learning_rate: 1e-3
max_grad_norm: 1.0
warmup_steps: 2000
lr_scheduler_type: cosine
# bf16 training: Adam's `1 / sqrt(v_hat + eps)` denominator can underflow
# at the bf16 default eps=1e-8 when second moments get small. Lifting eps
# to 1e-6 stays well within bf16's ~7-bit mantissa precision range and
# avoids numerical instability on the rare-token / low-gradient params.
# Matches LLaMA / Mistral / Qwen pretraining convention for bf16.
adam_epsilon: 1e-6

# Training
max_steps: -1
num_train_epochs: 1
seed: 42
per_device_train_batch_size: 6
per_device_eval_batch_size: 6
gradient_accumulation_steps: 3
eval_accumulation_steps: 3

# Logging
logging_steps: 25
logging_first_step: true
logging_nan_inf_filter: false
report_to: wandb
wandb_project: tiny-audio

# Evaluation
eval_strategy: steps
eval_steps: 1000

# Saving
save_strategy: steps
save_steps: 500
save_total_limit: 5
load_best_model_at_end: false
metric_for_best_model: eval_loss
greater_is_better: false
save_safetensors: true

# Hub
push_to_hub: true
hub_model_id: "mazesmazes/tiny-audio"
hub_strategy: every_save
hub_token: null
hub_private_repo: false

# Performance
fp16: false
bf16: true
tf32: true
torch_compile: true
# group_by_length varies the batch shape per bucket, which would otherwise
# blow past dynamo's default cache_size_limit=8 and force eager fallback.
torch_compile_config:
  cache_size_limit: 256
attn_implementation: flash_attention_2

# Data loading
dataloader_num_workers: 24
dataloader_prefetch_factor: 2
dataloader_pin_memory: true
dataloader_persistent_workers: true
dataloader_drop_last: true
group_by_length: true
length_column_name: duration

# RIR (Room Impulse Response) augmentation — convolves with a random RIR
# from a pool of real recorded RIRs to simulate far-field / reverberant
# audio. SOTA recipe used by NeMo / Canary / Parakeet. Run
# `ta dev download-rirs` to fetch OpenSLR-28 to ~/.cache/openslr-28.
rir_augmentation:
  enabled: true
  # OpenSLR-28's real recorded RIRs. pointsource_noises is intentionally
  # excluded — those are noise clips, not impulse responses. simulated_rirs
  # is also excluded — only real RIRs are used.
  corpus_path:
    - ~/.cache/openslr-28/real_rirs_isotropic_noises
  # Dropped 0.5 → 0.3 as part of the E22 / Peoples / GS tilt: heavy RIR
  # primarily helps AMI-SDM (far-field meeting) and to a lesser extent
  # Switchboard, neither of which is a target eval anymore. 0.3 still
  # provides enough room-acoustics exposure to route SPGI's clean
  # finance audio toward E22's conference-room distribution (which is
  # the SPGI→E22 transfer lever we're keeping), while shrinking the
  # encoder-feature smear that was costing on clean-source corpora.
  prob: 0.3

# Noise augmentation — pitch shift (source-side) + MUSAN ambient + MUSAN
# babble + always-on Gaussian sensor floor + EQ + clipping + OneOf{LPF,
# telephony BPF} + gain + MP3. Music subset is excluded; ambient and
# speech (babble) subsets are wired in as separate AddBackgroundNoise
# stages with independent SNR ranges and probabilities. Pitch shift runs
# first so the rest of the chain layers onto the pitch-shifted signal.
noise_augmentation:
  enabled: true
  # Time stretch — pitch-preserving speed perturbation. Canonical
  # Kaldi/ESPnet ASR aug that was previously absent from the stack.
  # Proxies speaking-rate diversity: Peoples (variable archive speakers
  # at different paces), CV (L2 accented speakers with non-native
  # rhythm), and E22 (Q&A spontaneity vs prepared remarks). 0.95-1.05x
  # stays well inside Whisper's natural speaking-rate distribution so
  # the frozen encoder absorbs it without feature drift. p=0.10 keeps
  # joint-firing with other source-side / capture augs in the low-
  # single-digit range. leave_length_unchanged=True (hard-coded in the
  # Python wrapper) pads or trims to match input length — at slowdown
  # the tail trim drops a small fraction of speech, at speedup the
  # zero-pad shows up as trailing silence; both are tolerable for
  # frozen-encoder projector training.
  time_stretch_prob: 0.10
  time_stretch_min_rate: 0.95
  time_stretch_max_rate: 1.05
  # Pitch shift — speaker-variation proxy, applied after time stretch.
  # The two source-side augs compose: rate-and-pitch-perturbed signal
  # then goes through the capture chain. ±2 semitones stays inside
  # Whisper's pretraining voice distribution (~1 octave of natural
  # pitch variability spans most adult voices); larger shifts push
  # features OOD for a frozen encoder. p=0.05 — low-cost overlap with
  # other augs, primarily targets CV accent/speaker-diversity exposure.
  pitch_shift_prob: 0.05
  pitch_shift_min_semitones: -2.0
  pitch_shift_max_semitones: 2.0
  # MUSAN ambient subset (`musan/noise` — ~930 wav, ~6 hours: rain,
  # thunder, wind, crowd chatter, cafeteria, footsteps, paper, mechanical,
  # phone tones). Stationary background; pairs with babble below for
  # multi-talker scenes.
  corpus_path:
    - ~/.cache/musan/musan/noise
  # Trajectory: 0.6 → 0.45 (when babble added) → 0.35 (when LS-clean /
  # Tedlium clean-source gaps surfaced) → 0.25 here, as part of the
  # E22 / Peoples / GS tilt. The previous wins this aug was protecting
  # (Switchboard -5.02 and AMI-SDM -3.91 leads) are no longer target
  # evals, so the noise-robustness footprint can shrink further to free
  # clean-feature capacity for the corpora where the gaps live. ~12-15%
  # fully-clean tail (no MUSAN AND no LPF AND no BPF) is preserved.
  prob: 0.25
  # SNR floor raised 8 → 10 dB as part of the same tilt. Below 10 dB,
  # frozen Whisper produces encoder features near the edge of its
  # training distribution — fine for noise-robustness wins on
  # Switchboard/AMI but a tax on clean-source corpora that doesn't pay
  # back when those wins aren't the target. 10 dB stays well within
  # realistic SNRs for E22 conference audio and Peoples dirty source.
  # Upper bound of 30 dB lets some samples be effectively clean.
  min_snr_db: 10.0
  max_snr_db: 30.0
  # MUSAN babble (`musan/speech` — multi-talker speech). Multi-talker
  # overlap is the canonical Switchboard / AMI-SDM aug; E22 is mostly
  # single-speaker conference calls, GS is curated podcast/YouTube, and
  # Peoples already contains natural overlap in `dirty_sa`. Trajectory:
  # 0.20 → 0.15 → 0.10 → 0.03 here, as the target evals shifted away
  # from conversational overlap. SNR floor unchanged at 15 dB — at low
  # babble SNR the synthetic masker stacks on natively-overlapping
  # training corpora and the label becomes ambiguous.
  babble_corpus_path:
    - ~/.cache/musan/musan/speech
  babble_prob: 0.03
  babble_min_snr_db: 15.0
  babble_max_snr_db: 25.0
  # MUSAN music (`musan/music` — instrumental + vocal tracks across
  # genres). Previously excluded by policy to avoid pulling the model
  # toward "transcribe lyrics" behavior, but high-SNR background music
  # (20-30 dB) is in-distribution for the GS YouTube slice (frequent
  # low-level beds, intros, outros) and a meaningful fraction of E22
  # conference intros/outros. Kept at low prob + high SNR floor so the
  # music always sits as background dressing, never foreground content
  # the model could mistake for lyrics to transcribe. If the model
  # starts emitting song fragments on clean evals, drop music_prob to 0.
  music_corpus_path:
    - ~/.cache/musan/musan/music
  music_prob: 0.05
  music_min_snr_db: 20.0
  music_max_snr_db: 30.0
  # Always-on additive colored-noise sensor floor — present whether or
  # not MUSAN fired this clip, since real recordings always have per-clip
  # background dither. SNR sampled uniformly per clip; 20-40 dB is the
  # canonical "background dither" range. Spectral shape sits around pink
  # (-3 dB/octave) with a narrow spread: pink/brown matches real
  # mic-preamp 1/f noise and acoustic-room HVAC far better than white
  # Gaussian, and Whisper has seen far more pink-ish dither in
  # pretraining than flat-spectrum noise. Set both SNR bounds to null
  # to disable.
  color_noise_min_snr_db: 20.0
  color_noise_max_snr_db: 40.0
  # f_decay in dB/octave: 0 = white, -3 = pink, -6 = brown.
  color_noise_min_f_decay: -4.0
  color_noise_max_f_decay: -2.0
  # Sparse short-duration transient events (phone dings, key clicks, dog
  # barks, doors) layered on top of the stationary background mix. MUST be
  # a sound-event corpus (FSD50K), NOT MUSAN — MUSAN/noise is stationary
  # so AddShortNoises on it just duplicates AddBackgroundNoise's
  # distribution. Run `ta dev download-fsd50k` to fetch FSD50K eval split.
  # Set short_noises_corpus_path: null to disable.
  short_noises_corpus_path:
    - ~/.cache/fsd50k/FSD50K.eval_audio
  # Dropped 0.5 → 0.2 as part of the E22 / Peoples / GS tilt. The favored
  # target evals (E22 prepared earnings calls, GS curated podcast /
  # audiobook slice, SPGI studio, LibriHeavy audiobook, CV controlled-
  # recording) are relatively clean of sporadic transient events; Peoples
  # dirty source has natural events and doesn't need synthetic ones piled
  # on. p=0.5 was tuned when AMI-SDM and in-the-wild robustness were
  # targets — those wins are no longer being protected, so half of training
  # clips getting random barks / clicks / doors / paper rustle is more
  # feature-distribution smear than the target evals can use. p=0.2 keeps
  # some transient exposure for the small Peoples-dirty / AMI-IHM slices
  # without flooding the encoder feature distribution.
  short_noises_prob: 0.2
  # High-pass filter — mic-bus stage roll-off. Every podcast / broadcast
  # capture chain applies a low-cut (typically 60-120 Hz) to remove
  # rumble, A/C noise, and mic-handling thumps before EQ. The stack has
  # LPF (consumer-device cutoff at the listener end); HPF completes the
  # picture at the capture end. In-distribution for the GS podcast
  # slice and most E22 conference-mic recordings. p=0.15 — common
  # enough in target evals that we want substantial exposure.
  high_pass_prob: 0.15
  high_pass_min_cutoff: 60.0
  high_pass_max_cutoff: 120.0
  # Seven-band parametric EQ — simulates mic / preamp coloration. ±4 dB
  # (vs library default ±12) is tuned for projector training: Whisper has
  # already seen wide EQ variation in pretraining and aggressive EQ pushes
  # features OOD. For training the encoder from scratch, push to ±6-8 dB.
  eq_prob: 0.5
  eq_min_db: -4.0
  eq_max_db: 4.0
  # Tanh soft saturation — analog preamp / front-end overdrive. Smooth,
  # not the hard ADC ceiling that ClippingDistortion below models. In-
  # distribution for cheap conference-room mic chains where the preamp
  # colors the signal long before the ADC ever clips. 0.1-0.4 drive
  # stays in mild analog-coloration territory; >0.5 starts to sound
  # obviously distorted and would push encoder features OOD. p=0.05
  # for a low-prevalence in-distribution flavor, mainly targeting E22.
  tanh_distortion_prob: 0.05
  tanh_distortion_min_distortion: 0.1
  tanh_distortion_max_distortion: 0.4
  # Hard clipping at a low percentile (top 10% of samples). Library
  # default of 40 is more aggressive than Whisper's training distribution.
  # max_percentile=10 is tuned for projector training; push to 20 if
  # training the encoder from scratch. Probability lowered 0.10 → 0.05
  # as part of a broader noise-aug footprint reduction targeted at the
  # clean-source eval gaps; Switchboard / AMI don't depend on clipping
  # aug specifically, so this shouldn't regress those wins.
  clipping_prob: 0.05
  clipping_max_percentile: 10
  # Band-limit branches — LPF (cheap-mic / consumer-device cutoff,
  # 3-7.5 kHz) and BPF (G.711 / PSTN passband ≈ 200-4000 Hz) fire
  # independently. Previously a OneOf at 0.3 (~0.15 LPF / ~0.15 BPF
  # mutually exclusive); split so LPF and BPF can be tuned separately.
  #
  # LPF bumped 0.15 → 0.25: consumer-device cutoff is in-distribution
  # for Peoples dirty source, GS YouTube, and E22 conference-mic audio
  # — exactly the corpora whose gaps we're targeting. Slightly more
  # exposure helps device-diversity coverage without the encoder-OOD
  # cost that the SNR-floor drops were guarding against.
  #
  # BPF dropped 0.15 → 0.03: telephony passband is essentially a
  # Switchboard-specific aug; E22 / Peoples / GS / CV / LibriHeavy /
  # VoxPopuli see no telephony content. Keeping a small residual prob
  # rather than 0 so the model doesn't lose the telephony band entirely
  # (in-distribution for the small Switchboard slice we're keeping).
  #
  # Joint LPF+BPF fire rate is 0.25 * 0.03 = 0.75% — well below the
  # ~2.25% level the prior OneOf was guarding against, so the
  # incoherent-stack concern is negligible.
  lowpass_prob: 0.25
  lowpass_min_cutoff: 3000.0
  lowpass_max_cutoff: 7500.0
  bandpass_prob: 0.03
  bandpass_min_center_freq: 2000.0
  bandpass_max_center_freq: 2200.0
  bandpass_min_bandwidth_fraction: 1.7
  bandpass_max_bandwidth_fraction: 1.9
  # Gain perturbation — applied late, so it shifts target+noise together
  # and simulates ADC / input-level variability. Whisper normalizes mels
  # per-clip but not perfectly across very different input levels, so
  # this actually moves encoder features (unlike speed perturbation,
  # which a frozen encoder largely absorbs). ±6 dB is the canonical
  # range; targets Earnings22's variable-level conference audio.
  gain_prob: 0.5
  gain_min_db: -6.0
  gain_max_db: 6.0
  # MP3 round-trip — bumped 0.10 → 0.25 and min_bitrate 96 → 64 kbps
  # as part of the E22 / Peoples / GS tilt. Lossy codec is in-distribution
  # for the favored corpora (GS YouTube slice is natively MP3/AAC,
  # Peoples dirty source is heavily lossy) and the prior worry — codec
  # stacking on bandlimit producing systematic regressions — no longer
  # applies because BPF is at 0.03 (joint MP3+BPF firing rate is
  # 0.25 * 0.03 = 0.75%, vs the 6% in the failed earlier experiment) and
  # because Switchboard / AMI-SDM are no longer wins we're protecting.
  # 64 kbps lower bound matches realistic streaming / YouTube encoding
  # quality. If clean-source corpora (LibriHeavy / CV) regress > ~0.5
  # WER on the next eval, walk back to mp3_min_bitrate=96 first before
  # touching prob — bitrate is the more aggressive lever.
  mp3_prob: 0.25
  mp3_min_bitrate: 64
  mp3_max_bitrate: 128

# Probability of replacing a training sample's audio with a noise-only
# clip + empty target. Teaches the model "no speech → emit nothing" — a
# documented failure mode for Whisper-based and SALMONN-based speech LLMs
# (backchanneling "yeah" / "huh" / "i" on AMI silence segments).
# Speech-LLM-recipe modal range is 0.03-0.10. Requires
# noise_augmentation.enabled (the corpus is the noise-only source).
silence_injection_prob: 0.05

# Misc
disable_tqdm: false
log_level: info
ignore_data_skip: false
resume_from_checkpoint: null

# Required by HF Trainer
remove_unused_columns: false
label_names:
  - labels
