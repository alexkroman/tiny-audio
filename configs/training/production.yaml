# Production training configuration
output_dir: ./outputs/production_model

# Optimizer
optim: adamw_torch_fused
learning_rate: 1e-4
max_grad_norm: 1.0
warmup_steps: 2000
lr_scheduler_type: cosine

# Training
max_steps: -1
num_train_epochs: 1
seed: 42
per_device_train_batch_size: 6
per_device_eval_batch_size: 6
gradient_accumulation_steps: 3
eval_accumulation_steps: 3

# Logging
logging_steps: 25
logging_first_step: true
logging_nan_inf_filter: false
report_to: wandb
wandb_project: tiny-audio

# Evaluation
eval_strategy: steps
eval_steps: 1000

# Saving
save_strategy: steps
save_steps: 500
save_total_limit: 5
load_best_model_at_end: false
metric_for_best_model: eval_loss
greater_is_better: false
save_safetensors: true

# Hub
push_to_hub: true
hub_model_id: "mazesmazes/tiny-audio"
hub_strategy: every_save
hub_token: null
hub_private_repo: false

# Performance
fp16: false
bf16: true
tf32: true
torch_compile: true
# group_by_length varies the batch shape per bucket, which would otherwise
# blow past dynamo's default cache_size_limit=8 and force eager fallback.
torch_compile_config:
  cache_size_limit: 256
model_dtype: bfloat16
attn_implementation: flash_attention_2

# Data loading
dataloader_num_workers: 24
dataloader_prefetch_factor: 2
dataloader_pin_memory: true
dataloader_persistent_workers: true
dataloader_drop_last: true
group_by_length: true
length_column_name: duration

# Speed perturbation — Kaldi-style 3-rate resampling (0.9 / 1.0 / 1.1×).
# Played at the original sample rate, the perturbed signal sounds sped up
# or slowed down with a coupled pitch shift. Universal recipe in NeMo /
# ESPnet / K2 / Icefall — adds rate-of-speech variation effectively for
# free. Runs FIRST in the augmentation chain so reverb / noise apply to
# the perturbed signal.
speed_perturbation:
  enabled: true
  rates: [0.9, 1.0, 1.1]
  prob: 1.0

# SpecAugment — 2024-era recipe (NeMo Canary / Parakeet / Distil-Whisper):
# 10 time masks of width 100 + 2 freq masks of width 27. The convergence
# in modern recipes is "many small time masks > few large ones"; freq
# settings are unchanged from the 2019 LibriDouble preset (still SOTA).
# Applied on the mel spectrogram during training.
use_specaugment: true
num_time_masks: 10
time_mask_length: 100
num_freq_masks: 2
freq_mask_length: 27

# RIR (Room Impulse Response) augmentation — simulates far-field / reverberant
# audio by convolving with a random RIR sampled from a pool. Two backends:
#   * corpus_path set — load real RIRs from a directory of WAV files
#     (recommended; SOTA recipe used by NeMo / Canary / Parakeet). Run
#     `ta dev download-rirs` to fetch OpenSLR-28 to ~/.cache/openslr-28.
#   * corpus_path null — generate synthetic RIRs at init via pyroomacoustics'
#     image-source method using the room / T60 ranges below. CPU-only,
#     no corpus needed; less realistic.
#
# Range defaults mirror Interspeech 2024 / ICASSP 2025 ASR-robustness recipes
# and only matter for the synthetic backend. prob 0.5 ensures roughly half of
# every batch sees reverb without overwhelming clean-speech training signal.
rir_augmentation:
  enabled: true
  # Combine OpenSLR-28's real RIRs with its much larger simulated_rirs set
  # (~60K simulated impulses) so pool_size sub-samples from the full corpus
  # each run. pointsource_noises is intentionally excluded — those are noise
  # clips, not impulse responses.
  corpus_path:
    - ~/.cache/openslr-28/real_rirs_isotropic_noises
    - ~/.cache/openslr-28/simulated_rirs
  # Bumped from 2048 → 8192: sub-sampling 2K from ~60K simulated impulses was
  # leaving real-RIR diversity on the table, especially relevant for ami-sdm.
  pool_size: 8192
  # Widened from [3, 10] / [2.4, 4] / t60 [0.1, 1.0] to capture larger meeting
  # rooms with longer reverberation. Real AMI rooms are bigger and more
  # reverberant than the prior synthetic distribution covered.
  room_x_range: [3.0, 15.0]
  room_y_range: [3.0, 15.0]
  room_z_range: [2.4, 5.0]
  t60_range: [0.2, 1.5]
  # 0.5 → 0.7: embedded ASR sees reverberant audio more than half the time in
  # deployment; current 50/50 clean split underweights real conditions.
  prob: 0.7
  seed: null

# Noise augmentation — mixes background noise into the signal via
# torch-audiomentations. Two backends:
#   * corpus_path set — AddBackgroundNoise samples a random clip from a
#     directory of audio files (recommended; SOTA recipe). Run
#     `ta dev download-musan` to fetch MUSAN to ~/.cache/musan.
#   * corpus_path null — AddColoredNoise synthesizes white / pink / blue /
#     violet noise. Cheap, no corpus, but lacks real-world structure.
# CPU-friendly; chains after RIR in the dataloader transform pipeline.
#
# SNR range [-5, 25] dB pushes robustness into the low-SNR regime that drives
# the People's Speech / CommonVoice / Earnings22 gap. Lower bound matches
# modern NeMo / Canary / Parakeet recipes.
noise_augmentation:
  enabled: true
  # MUSAN (music + speech + noise, ~109h) plus OpenSLR-28's pointsource_noises
  # (~843 clips) — the canonical Kaldi/NeMo noise pool.
  corpus_path:
    - ~/.cache/musan/musan
    - ~/.cache/openslr-28/pointsource_noises
  prob: 0.7
  min_snr_db: -5.0
  max_snr_db: 25.0
  # Bias 35% of corpus draws toward MUSAN/speech (multi-talker babble).
  # Babble is the most ASR-relevant noise texture but otherwise only ~14% of
  # MUSAN+pointsource_noises files. Closes the People's / CV / Earnings22 gap.
  babble_weight: 0.35
  # Convolve noise with a random RIR before mixing so the noise inherits the
  # same room response as the (already-reverbed) clean signal. Aligns with
  # NeMo / Canary recipe; modest realism win for ami-sdm + LS-other.
  reverb_noise: true

# Misc
disable_tqdm: false
log_level: info
ignore_data_skip: false
resume_from_checkpoint: null

# Required by HF Trainer
remove_unused_columns: false
label_names:
  - labels
