# S2S Codes training dataset: LibriTTS with pre-computed DAC codes
# Used for AudioHead MLP projector training (frozen Dia decoder)

sample_rate: 16000  # Input audio sample rate (for ASR encoder)
dataset_cache_dir: null
max_eval_samples: 500
num_proc: 8

datasets:
  - path: mazesmazes/libritts-dac
    train_splits:
      - train.clean.100
      - train.clean.360
    eval_splits:
      - train.clean.100
    # Column mappings
    audio_column: audio
    text_column: text
    codes_column: codes  # DAC codes [9 codebooks][seq_len]
    eval_max_samples: 500
