# Multi-ASR dataset configuration
#
# Mix tilted toward Earnings22 / Peoples / GigaSpeech, deliberately
# trading some Switchboard, AMI-SDM, and SPGI headroom (where we
# already lead universal-3-pro comfortably) for closure on the larger
# residual gaps: Peoples (+6.27), Earnings22 (+2.61), Gigaspeech (+1.58).
# Paired with the aug-stack tilt in production.yaml (RIR 0.5→0.3,
# MUSAN ambient 0.35→0.25 + SNR floor 8→10 dB, babble 0.10→0.03,
# bandlimit split into LPF=0.25 + BPF=0.03, MP3 0.10→0.25 @ 64-128 kbps)
# which together pull encoder-feature mass out of the telephony /
# heavy-reverb / multi-talker basin and toward conference-room /
# consumer-device / lossy-codec distributions where the target evals
# live. Peoples can't grow on quantity here because un-sa-filtered
# pools fail the alignment-quality bar — Peoples gap closure has to
# come from aug landing the model in dirty_sa's acoustic distribution.
# LoquaciousSet was dropped in a prior revision; the unique coverage
# Loquacious bundled (LibriHeavy / VoxPopuli) is restored here as
# direct HF slices with explicit per-source sizing:
#   - LibriHeavy `medium` (5,042hr / ~1.1M, mythicinfinity mirror) —
#     replaces LibriSpeech clean+other (uppercase / no-punct) entirely.
#     `text_original` preserves case + punctuation, matching the Qwen3
#     decoder's native output format; LibriSpeech's uppercase-no-punct
#     was a format minority polluting the dominant cased+punct training
#     distribution. LibriHeavy's source pool is a strict superset of
#     LibriSpeech (same LibriLight base, plus the harder speakers LS
#     filtered out as "too noisy"), so this swap also gains acoustic
#     diversity. Step to `large` (50,794hr) only if LH-medium proves
#     data-limited on LibriVox-domain eval; medium already gives 3.4×
#     the prior LibriHeavy-small + LS clean+other clean-read budget.
#   - VoxPopuli `en` (543hr / ~168K) — L2-European parliamentary speech.
#     `raw_text` preserves case+punct; `normalized_text` is lowercase
#     no-punct (LS-style) and is the wrong format for the Qwen3 decoder.
# YODAS was evaluated and rejected for this revision: en000 is ~469 GB
# (500 × 938 MB tarballs) for ~5,000hr / ~2.5M samples. The codebase
# loads via load_dataset() in map mode (not streaming), so a
# target_samples cap would not reduce download — the full shard
# materializes to disk before sampling. Label quality is also weaker
# than the other corpora (YouTube user-provided captions even on the
# manual tier are not verbatim ASR-grade). Gigaspeech M's YouTube slice
# already provides curated in-the-wild coverage at higher label quality
# and ~22× smaller footprint; revisit YODAS only if a streaming-mode
# data path lands or if Gigaspeech long-form eval gaps persist.
# Peoples mix unchanged from prior revision: `clean_sa` + `dirty_sa`
# pair (~311K each) — sentence-aligned alignment quality on both tiers,
# spanning the clean-source + dirty-source acoustic spectrum. Peoples
# eval refs are human-transcribed (paid native-English transcribers per
# the MLCommons dataset card), so the +6.27 gap is genuine acoustic /
# distribution coverage, not ref-noise inflation. CV / Gigaspeech /
# SPGISpeech / Switchboard / AMI retained at prior caps. No dataset is
# repeated — every target_samples is at or below the natural train-split
# size, so each example is seen at most once per epoch.
#
# ┌──────────────────────────┬───────────┬─────────┐
# │ Dataset                  │ Samples   │ Percent │
# ├──────────────────────────┼───────────┼─────────┤
# │ Gigaspeech L (natural)   │ ~2,000,000│   34.1% │
# │ LibriHeavy medium (nat)  │ ~1,100,000│   18.7% │
# │ CommonVoice 17 en (flt)  │ ~1,050,000│   17.9% │
# │ Peoples dirty_sa (nat)   │  ~602,000 │   10.3% │
# │ Peoples clean_sa (nat)   │   311,000 │    5.3% │
# │ TEDLIUM-3 (natural)      │  ~268,000 │    4.6% │
# │ VoxPopuli en (natural)   │  ~168,000 │    2.9% │
# │ SPGISpeech M (capped)    │   150,000 │    2.6% │
# │ AMI IHM (natural)        │   108,502 │    1.8% │
# │ Switchboard (capped)     │    75,000 │    1.3% │
# │ AMI SDM (capped)         │    40,000 │    0.7% │
# └──────────────────────────┴           ┴         ┘
# Total: ~5,872,500 samples (effectively trained on)
# (Peoples combined: 913K = 15.6% of mix — absolute Peoples count
#  unchanged from prior 913K; share dropped only because GS L step
#  pushed the denominator up. Peoples is still the dominant residual
#  gap, but the closure lever here is aug not quantity since un-sa
#  pools fail the alignment-quality bar. CV row count is post the
#  down_votes==0 filter applied in scripts/train.py, which drops ~5%
#  of train.)
#
# Download-size choices: Gigaspeech uses speechcolab's official L tier
# (~2,500hr / ~2M segments — stepped up from M for the +1.58 gap, full
# natural cap, no replay). CommonVoice and LibriSpeech both use the
# fixie-ai mirrors for their sharded parquet layouts. TEDLIUM uses the
# canonical LIUM mirror. LibriHeavy uses mythicinfinity's mirror (audio
# arrays included, Opus-encoded) — pkufool/libriheavy is a Lhotse
# manifest repo, not a directly-loadable audio dataset.

datasets:
  # TEDLIUM-3 — TED talk presentational speech. Re-added after a prior
  # streaming experiment dropped it; tiny-audio is 2.08pt behind
  # universal-3-pro on this eval and direct exposure is the lever.
  # Note: transcripts are normalized (lowercase, no punctuation); ~7% of
  # the mix so the dominant cased+punct signal should absorb it. Apply
  # case+punct restoration as a preprocess in a follow-up run if output
  # formatting bias shows up empirically.
  - path: sanchit-gandhi/tedlium-data
    audio_column: audio
    text_column: text
    task: transcribe
    train_splits: [train]
    eval_splits: [validation]
    # natural cap ~268K samples (~452hr); LIUM/tedlium no longer on Hub

  # LibriHeavy `medium` (mythicinfinity mirror, ~5,042hr / ~1.1M).
  # LibriVox-sourced audiobook readings — same underlying LibriLight
  # source pool as LibriSpeech, but `text_original` preserves the book's
  # case + punctuation (LibriSpeech collapses to uppercase / no-punct,
  # which fights the Qwen3 decoder's native cased+punct output format).
  # `medium` (5,042hr / 1.1M) replaces the prior LibriHeavy-small +
  # LibriSpeech clean+other trio (~1,470hr / ~404K combined) — 3.4×
  # more clean-read hours at uniformly higher label quality, removing
  # the LS uppercase-no-punct format minority that was polluting the
  # decoder's output distribution. LibriHeavy is a strict superset of
  # LibriSpeech's source pool (includes the speakers LS labeled "other"
  # and the harder speakers LS filtered out entirely), so this swap
  # also gains acoustic diversity, not just label quality. Tier choices:
  # small (509hr) was prior; large (50,794hr / 11.2M) would dominate the
  # mix (~50% share) — step to it only if eval shows LH-medium still
  # data-limited on LibriVox-domain coverage. Note pkufool/libriheavy
  # is a Lhotse manifest repo (not loadable as-is); use the
  # mythicinfinity mirror which ships Opus-encoded audio arrays
  # (~140 GB download for medium).
  - path: mythicinfinity/libriheavy
    name: medium
    audio_column: audio
    text_column: text_original
    task: transcribe
    train_splits: [train]
    eval_splits: []

  # People's Speech `clean_sa` (311K train natural, CC-BY). Sentence-
  # aligned subset of `clean` — same CER ≤ 20% upper bound on alignment
  # quality, but additionally filtered to require cleanly-aligned
  # sentence boundaries. Paired with `dirty_sa` below to hedge across the
  # alignment-quality axis (sa on both) and the acoustic-coverage axis
  # (clean source pool here, dirty source pool in the sibling entry).
  # Peoples eval refs are human-transcribed (paid native-English
  # transcribers, not auto-aligned), so the +6.27 eval gap is real
  # model-quality not ref-noise — the lever is acoustic exposure to the
  # eval distribution, balanced against avoiding over-fit to noisy
  # auto-aligned training labels. Validation lives in the sibling
  # 'validation' config below.
  - path: MLCommons/peoples_speech
    name: clean_sa
    audio_column: audio
    text_column: text
    task: transcribe
    train_splits: [train]
    eval_splits: []

  # People's Speech `dirty_sa` (natural 602K, no cap). Same sentence-
  # aligned alignment-quality bar as clean_sa, but drawn from the
  # noisier `dirty` source tier (uncontrolled mics, older/archival
  # audio, varying SNR). Prior revision capped to 311K for 1:1
  # clean/dirty balance — lifted to natural 602K because Peoples is the
  # dominant residual gap vs universal-3-pro (+6.27 on tiny-audio-
  # embedded baseline; further regressed to +9.18 on the 622K sa-pair
  # mid-run, indicating quantity matters more than 1:1 source-tier
  # balance for closing this gap). Combined with clean_sa's 311K
  # natural, Peoples mix share rises to ~18% (vs ~12.6% when capped).
  # If the gap closes asymmetrically (e.g., dirty closes faster than
  # clean), revisit by adding the un-sa-filtered `clean` (1.5M) pool
  # next — quantity-over-alignment-quality has direct empirical support
  # in this gap.
  - path: MLCommons/peoples_speech
    name: dirty_sa
    audio_column: audio
    text_column: text
    task: transcribe
    train_splits: [train]
    eval_splits: []

  # People's Speech validation split — MLCommons ships dev/test as separate
  # configs (not splits inside clean_sa). Validation is human-transcribed
  # (paid native-English transcribers) so eval refs are clean ground
  # truth, not auto-aligned. Pairs with the clean_sa + dirty_sa train
  # entries above (validation is config-independent — same split serves
  # whichever train config is loaded).
  - path: MLCommons/peoples_speech
    name: validation
    audio_column: audio
    text_column: text
    task: transcribe
    train_splits: []
    eval_splits: [validation]

  # CommonVoice 17 English (fixie-ai mirror, ~1.1M train pre-filter).
  # Strict-validated filter applied in scripts/train.py: rows with
  # down_votes != 0 are dropped, cutting the small tail of community-
  # flagged audio/transcript mismatches that Mozilla's standard `train`
  # split still admits (validated requires up_votes > down_votes, not
  # down_votes == 0). Expected to drop ~2-5% of train rows. Natural cap;
  # target_samples omitted to maximize CV exposure. CV is a +3.14 eval
  # gap vs universal-3-pro driven primarily by accent + device-diversity
  # distribution shift, not reference noise — filtering helps but won't
  # close it fully.
  - path: fixie-ai/common_voice_17_0
    name: en
    audio_column: audio
    text_column: sentence
    task: transcribe
    train_splits: [train]
    eval_splits: [validation]

  # Gigaspeech L (official speechcolab repo). L tier is ~2,500hr / ~2M
  # segments — natural cap, no replay. Stepped up from M (~1,000hr /
  # ~910K) because GS is one of the three target evals (+1.58 gap) and
  # quantity is the cleanest lever: L is a strict superset of M (same
  # source distribution + curation pipeline, just more hours) so the
  # step has no label-quality cost. Long-form / podcast / YouTube
  # register coverage preserved and expanded. Lossy-codec content in
  # L (YouTube slice) pairs naturally with the bumped MP3 aug in
  # production.yaml (p=0.25 @ 64-128 kbps). Requires accepting the
  # dataset license on HF and HF_TOKEN at load. Download footprint is
  # ~2.5× the prior M tier — verify disk / network budget on the
  # training host before kicking off.
  - path: speechcolab/gigaspeech
    name: l
    audio_column: audio
    text_column: text
    task: transcribe
    train_splits: [train]
    eval_splits: []
    target_samples: 2000000

  # Gigaspeech dev split — official repo ships dev/test as separate configs
  # (same pattern as the fixie mirror). The `dev` config exposes its data
  # under split name `validation` (HF builder convention).
  - path: speechcolab/gigaspeech
    name: dev
    audio_column: audio
    text_column: text
    task: transcribe
    train_splits: []
    eval_splits: [validation]

  # SPGISpeech M - financial earnings calls. Capped 385K → 150K as part
  # of the E22 / Peoples / GS tilt: SPGI is read prepared earnings-call
  # remarks in studio conditions, while E22 (the eval SPGI was meant to
  # target) is conference-room audio with Q&A spontaneity and L2 accents
  # — more SPGI hours don't actually close the SPGI-to-E22 distribution
  # gap because the gap is acoustic / register, not vocabulary. 150K
  # preserves finance/earnings vocabulary exposure while freeing ~235K
  # mix slots that GS L absorbs. SPGI is also already performing well
  # on its native eval, so 1-2 WER of SPGI-eval loss is an acceptable
  # trade. The SPGI→E22 transfer aug (small-room RIR at 0.3) does the
  # work of pushing SPGI's clean finance audio into E22's conference
  # acoustic distribution.
  - path: kensho/spgispeech
    name: M
    audio_column: audio
    text_column: transcript
    task: transcribe
    train_splits: [train]
    eval_splits: [validation]
    target_samples: 150000

  # VoxPopuli `en` (facebook, natural ~168K / ~543hr). European Parliament
  # L2-accented English read by parliamentarians — restores the VP
  # coverage Loquacious bundled (550hr via Loquacious-large; 500hr via
  # Loquacious-medium). `raw_text` preserves case + punctuation (matches
  # parliamentary record formatting); `normalized_text` is lowercased
  # with punctuation removed (LibriSpeech-style) and is the wrong format
  # for the Qwen3 decoder, so use `raw_text` despite the noisier label
  # surface. Natural cap — small enough to take whole, no replay risk.
  # Validation split exists so include it in eval rotation.
  - path: facebook/voxpopuli
    name: en
    audio_column: audio
    text_column: raw_text
    task: transcribe
    train_splits: [train]
    eval_splits: [validation]

  # Switchboard - conversational telephone speech. Capped 185K → 75K
  # as part of the E22 / Peoples / GS tilt. Switchboard is no longer a
  # target eval (we lead universal-3-pro by -5.02 WER and that lead is
  # surplus relative to where the gaps actually are), and the telephony-
  # band + babble-overlap distribution it lives in is exactly what the
  # aug-stack tilt is moving the model away from. 75K preserves enough
  # exposure to keep the telephony-band representation alive (joint
  # with the bandpass_prob=0.03 residual) without spending mix budget
  # on a basin we're trying to de-emphasize. Expect SW lead to compress
  # from -5.02 to roughly -1 to -2 — still leading, but no longer
  # over-allocated.
  - path: hhoangphuoc/switchboard
    audio_column: audio
    text_column: transcript
    task: transcribe
    train_splits: [train]
    eval_splits: [validation]
    target_samples: 75000

  # AMI corpus IHM - close-talk meeting mic. Natural size (~108,502),
  # target_samples omitted. Prior 305K target was ~3x replay on the same
  # speakers and almost certainly drove the 29% IHM eval (overfit, not
  # data-limited).
  - path: edinburghcstr/ami
    name: ihm
    audio_column: audio
    text_column: text
    task: transcribe
    train_splits: [train]
    eval_splits: [validation]
    target_samples: 108502

  # AMI corpus SDM - single distant mic (far-field). Capped 107K → 40K
  # as part of the E22 / Peoples / GS tilt. AMI-SDM is no longer a
  # target eval (-3.91 WER lead vs universal-3-pro is surplus), and the
  # far-field / multi-talker / heavy-reverb distribution it lives in is
  # exactly what the RIR / babble / ambient-noise cuts are moving the
  # model away from. 40K preserves residual far-field exposure at a
  # share (~0.7% of mix) that won't dominate the encoder-feature
  # distribution. Expect AMI-SDM lead to compress from -3.91 toward
  # roughly parity with universal-3-pro — acceptable given E22 /
  # Peoples / GS are the corpora the model is being tuned for.
  - path: edinburghcstr/ami
    name: sdm
    audio_column: audio
    text_column: text
    task: transcribe
    train_splits: [train]
    eval_splits: [validation]
    target_samples: 40000

# Audio processing
sample_rate: 16000

# Processing options
dataset_cache_dir: ${hydra:runtime.cwd}/datasets_cache
# Cap each eval split at this many rows BEFORE concatenation so every
# dataset in the mix contributes a balanced slice to during-training
# eval. Prior `max_eval_samples: 2000` (global cap, applied post-concat)
# was a misconfig — it silently dropped all eval splits after the first
# ~2 (TEDLIUM 591 + head 1409 of Peoples val saturated the cap). At 250
# per dataset across 9 eval splits we get ~2,250 total — comparable
# total cost, but representative across TEDLIUM / Peoples / CV /
# Gigaspeech dev / SPGI / VoxPopuli / Switchboard / AMI IHM / AMI SDM.
max_eval_samples_per_dataset: 250
