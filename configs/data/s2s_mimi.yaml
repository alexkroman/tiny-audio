# S2S training dataset: LibriTTS with pre-computed Mimi codes
# Text + Mimi codes only (no audio processing needed)

sample_rate: 16000  # Not used for S2S but required by DatasetLoader
dataset_cache_dir: null
max_eval_samples: 500
num_proc: 8

datasets:
  - path: mazesmazes/libritts-mimi
    train_splits:
      - train.clean.100
      - train.clean.360
      - train.other.500
    eval_splits:
      - train.clean.100
    # Column mappings
    text_column: text
    codes_column: codes  # Mimi codes [8 codebooks][seq_len]
    eval_max_samples: 500
