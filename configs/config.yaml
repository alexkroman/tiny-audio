# Main configuration
defaults:
  - data: loquacious
  - training: production
  - _self_

# Model configuration (must match ASRConfig parameter names)
model:
  audio_model_id: zai-org/GLM-ASR-Nano-2512
  text_model_id: Qwen/Qwen3-0.6B
  system_prompt: ""
  projector_type: mlp  # Options: mlp, mosa, moe, qformer

  # Master weights in fp32 so AdamW updates below the bf16 ULP gap (~0.0078
  # near 1.0) actually land — bf16 master weights silently round small
  # RMSNorm/LayerNorm updates to zero, freezing every norm scale in the LM.
  # Compute is still bf16 via training.bf16=true autocast.
  model_dtype: float32

  # Projector settings
  projector_pool_stride: 4
  projector_hidden_dim: null

  # MoE settings (for moe/mosa projector types)
  num_experts: 4
  num_experts_per_tok: 2
  router_aux_loss_coef: 0.01

  # Generation settings
  max_new_tokens: 256

# Hydra output directories
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: true

# Early stopping (set patience to enable)
early_stopping:
  patience: null
  threshold: 0.0

verbose: false

# Data loading. EPYC 9355 has 32 cores; this is one-shot dataset prep, so
# we can afford to use most of them.
num_proc: 24
